version: '3.9'
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - '27017:27017'

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    ports:
      - '3001:3001'
    depends_on:
      - mongo
    environment:
      MONGODB_URI: mongodb://mongo:27017/iwords

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend

volumes:
  mongo_data:
